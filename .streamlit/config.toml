[server]
port = 8501
address = "0.0.0.0"
runOnSave = true
maxMessageSize = 50
enableStaticServing = true

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#4A90D9"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7FA"
textColor = "#2C3E50"
font = "sans serif"

[global]
developmentMode = false
showWarningOnDirectExecution = false

[runner]
magicEnabled = true

[logger]
level = "info"
